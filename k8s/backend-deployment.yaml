apiVersion: apps/v1
kind: Deployment
metadata:
  name: quantumrisk-backend
  labels:
    app: quantumrisk-backend
    track: stable
spec:
  replicas: 3
  selector:
    matchLabels:
      app: quantumrisk-backend
  template:
    metadata:
      labels:
        app: quantumrisk-backend
        track: stable
    spec:
      containers:
        - name: backend
          image: ghcr.io/your-org/quantumrisk-backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: quantumrisk-secrets
          resources:
            requests:
              cpu: "300m"
              memory: "512Mi"
            limits:
              cpu: "1500m"
              memory: "2Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: quantumrisk-backend-svc
spec:
  selector:
    app: quantumrisk-backend
  ports:
    - port: 80
      targetPort: 8000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: quantumrisk-backend-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: quantumrisk-backend
  minReplicas: 3
  maxReplicas: 30
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
