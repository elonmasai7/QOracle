apiVersion: apps/v1
kind: Deployment
metadata:
  name: quantumrisk-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: quantumrisk-worker
  template:
    metadata:
      labels:
        app: quantumrisk-worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/your-org/quantumrisk-worker:latest
          envFrom:
            - secretRef:
                name: quantumrisk-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: quantumrisk-worker-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: quantumrisk-worker
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
