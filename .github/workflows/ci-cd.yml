name: QuantumRisk CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Run tests
        run: pytest -q
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build
      - name: Build backend image
        run: docker build -t quantumrisk-backend -f backend/Dockerfile .
      - name: Build worker image
        run: docker build -t quantumrisk-worker -f worker/Dockerfile .
      - name: Build frontend image
        run: docker build -t quantumrisk-frontend -f frontend/Dockerfile .
